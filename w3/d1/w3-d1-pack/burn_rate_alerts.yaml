groups:
  - name: api-slo
    rules:
      - alert: api_burn_rate_tier1
        expr: |
          (1 - (sum(rate(http_requests_total{status!~"5..|429",latency_le="500"}[1h])) / sum(rate(http_requests_total[1h])))) / (1 - 0.97) >= 0.6
          and
          (1 - (sum(rate(http_requests_total{status!~"5..|429",latency_le="500"}[5m])) / sum(rate(http_requests_total[5m])))) / (1 - 0.97) >= 0.6
        labels: { severity: page, tier: "1" }

      - alert: api_burn_rate_tier2
        expr: |
          (1 - (sum(rate(http_requests_total{status!~"5..|429",latency_le="500"}[6h])) / sum(rate(http_requests_total[6h])))) / (1 - 0.97) >= 0.5
          and
          (1 - (sum(rate(http_requests_total{status!~"5..|429",latency_le="500"}[5m])) / sum(rate(http_requests_total[5m])))) / (1 - 0.97) >= 0.5
        labels: { severity: page, tier: "2" }

      - alert: api_burn_rate_tier3
        expr: |
          (1 - (sum(rate(http_requests_total{status!~"5..|429",latency_le="500"}[3d])) / sum(rate(http_requests_total[3d])))) / (1 - 0.97) >= 1
          and
          (1 - (sum(rate(http_requests_total{status!~"5..|429",latency_le="500"}[6h])) / sum(rate(http_requests_total[6h])))) / (1 - 0.97) >= 1
        labels: { severity: ticket, tier: "3" }

  - name: db-slo
    rules:
      - alert: db_burn_rate_tier1
        expr: |
          (1 - (sum(rate(db_queries_total{success="true",duration_le="100"}[1h])) / sum(rate(db_queries_total[1h])))) / (1 - 0.9995) >= 14.4
          and
          (1 - (sum(rate(db_queries_total{success="true",duration_le="100"}[5m])) / sum(rate(db_queries_total[5m])))) / (1 - 0.9995) >= 14.4
        labels: { severity: page, tier: "1" }

      - alert: db_burn_rate_tier2
        expr: |
          (1 - (sum(rate(db_queries_total{success="true",duration_le="100"}[6h])) / sum(rate(db_queries_total[6h])))) / (1 - 0.9995) >= 6
          and
          (1 - (sum(rate(db_queries_total{success="true",duration_le="100"}[30m])) / sum(rate(db_queries_total[30m])))) / (1 - 0.9995) >= 6
        labels: { severity: page, tier: "2" }

      - alert: db_burn_rate_tier3
        expr: |
          (1 - (sum(rate(db_queries_total{success="true",duration_le="100"}[3d])) / sum(rate(db_queries_total[3d])))) / (1 - 0.9995) >= 1
          and
          (1 - (sum(rate(db_queries_total{success="true",duration_le="100"}[6h])) / sum(rate(db_queries_total[6h])))) / (1 - 0.9995) >= 1
        labels: { severity: ticket, tier: "3" }

  - name: frontend-slo
    rules:
      - alert: frontend_burn_rate_tier1
        expr: |
          (1 - (sum(rate(frontend_page_loads_total{js_error="false",network_error="false",dom_ready_le="3000"}[1h])) / sum(rate(frontend_page_loads_total[1h])))) / (1 - 0.99) >= 14.4
          and
          (1 - (sum(rate(frontend_page_loads_total{js_error="false",network_error="false",dom_ready_le="3000"}[5m])) / sum(rate(frontend_page_loads_total[5m])))) / (1 - 0.99) >= 14.4
        labels: { severity: page, tier: "1" }

      - alert: frontend_burn_rate_tier2
        expr: |
          (1 - (sum(rate(frontend_page_loads_total{js_error="false",network_error="false",dom_ready_le="3000"}[6h])) / sum(rate(frontend_page_loads_total[6h])))) / (1 - 0.99) >= 6
          and
          (1 - (sum(rate(frontend_page_loads_total{js_error="false",network_error="false",dom_ready_le="3000"}[30m])) / sum(rate(frontend_page_loads_total[30m])))) / (1 - 0.99) >= 6
        labels: { severity: page, tier: "2" }

      - alert: frontend_burn_rate_tier3
        expr: |
          (1 - (sum(rate(frontend_page_loads_total{js_error="false",network_error="false",dom_ready_le="3000"}[3d])) / sum(rate(frontend_page_loads_total[3d])))) / (1 - 0.99) >= 1
          and
          (1 - (sum(rate(frontend_page_loads_total{js_error="false",network_error="false",dom_ready_le="3000"}[6h])) / sum(rate(frontend_page_loads_total[6h])))) / (1 - 0.99) >= 1
        labels: { severity: ticket, tier: "3" }