version: '3.8'

services:
  api:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./app:/app
    command: sh -c "pip install -q fastapi uvicorn && uvicorn main:app --host 0.0.0.0 --port 8888"
    ports: ["8888:8888"]
    environment:
      EVIL_REGEX_ACTIVE: "0" # Bật sẵn chế độ độc hại để test lỗi
    networks:
      - sharing_chaos_net # Đưa container này vào mạng dùng chung khai báo ở dưới

networks:
  sharing_chaos_net:
    external: true
    name: configs_chaos-network 