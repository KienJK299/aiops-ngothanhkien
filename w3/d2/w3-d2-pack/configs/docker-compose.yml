version: '3.8'

networks:
  chaos-network:
    driver: bridge

services:
  # --- INFRASTRUCTURE ---
  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: monuments_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - chaos-network

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@localhost:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_TRANSACTION_STATE_LOG_REREPLICATION_FACTOR=1
    networks:
      - chaos-network

  # Các DB mô phỏng dùng chung ảnh redis để nhẹ máy, giả lập port exporter 9187/9121
  payment-db:
    image: redis:7.0-alpine
    container_name: payment-db
    ports:
      - "9187:9187"
    networks:
      - chaos-network

  inventory-db:
    image: redis:7.0-alpine
    container_name: inventory-db
    ports:
      - "9187:9187"
    networks:
      - chaos-network

  cache-svc:
    image: redis:7.0-alpine
    container_name: cache-svc
    ports:
      - "9121:9121"
    networks:
      - chaos-network

  # --- 10 MOCK SERVICES (Dùng ảnh httpbin gọn nhẹ để giả lập phản hồi) ---
  frontend:
    image: kennethreitz/httpbin
    container_name: frontend
    ports:
      - "8081:80"
    networks:
      - chaos-network

  api-gateway:
    image: kennethreitz/httpbin
    container_name: api-gateway
    ports:
      - "8080:80"
    networks:
      - chaos-network

  payment-svc:
    image: kennethreitz/httpbin
    container_name: payment-svc
    networks:
      - chaos-network

  inventory-svc:
    image: kennethreitz/httpbin
    container_name: inventory-svc
    networks:
      - chaos-network

  notification-svc:
    image: kennethreitz/httpbin
    container_name: notification-svc
    networks:
      - chaos-network

  checkout-svc:
    image: kennethreitz/httpbin
    container_name: checkout-svc
    networks:
      - chaos-network

  auth-svc:
    image: kennethreitz/httpbin
    container_name: auth-svc
    networks:
      - chaos-network

  log-collector:
    image: kennethreitz/httpbin
    container_name: log-collector
    ports:
      - "9100:80"
    networks:
      - chaos-network

  dns-resolver:
    image: kennethreitz/httpbin
    container_name: dns-resolver
    networks:
      - chaos-network